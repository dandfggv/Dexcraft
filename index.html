<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dexcrafk - Download</title>
    <style>
      :root {
        --bg0: #050712;
        --bg1: #050814;
        --card: rgba(9, 13, 30, 0.96);
        --cardBorder: rgba(120, 150, 255, 0.35);
        --text: rgba(255, 255, 255, 0.96);
        --muted: rgba(200, 210, 255, 0.78);
        --accent0: #5b9cff;
        --accent1: #8b5bff;
        --accent2: #3cf2c8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background:
          radial-gradient(1200px 900px at 10% 0%, rgba(91, 156, 255, 0.18), transparent 55%),
          radial-gradient(900px 700px at 90% 10%, rgba(139, 91, 255, 0.18), transparent 60%),
          radial-gradient(900px 700px at 50% 100%, rgba(60, 242, 200, 0.12), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
        height: 100vh;
        overflow: hidden;
      }

      .card {
        max-width: 760px;
        width: 100%;
        background: var(--card);
        border: 1px solid var(--cardBorder);
        border-radius: 22px;
        padding: 28px;
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
        animation: fadeIn 0.7s ease-out forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      h1 { margin: 0 0 8px; font-size: 34px; }
      .sub { margin: 0 0 18px; color: var(--muted); }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 11px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(0, 0, 0, 0.35);
        font-size: 13px;
      }

      .row {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 20px;
        border-radius: 14px;
        text-decoration: none;
        color: white;
        font-weight: 700;
        font-size: 15px;
        background: linear-gradient(135deg, var(--accent0), var(--accent1));
        box-shadow: 0 14px 40px rgba(91, 156, 255, 0.35);
        cursor: pointer;
        border: none;
        transition: 0.2s ease-out;
      }

      .btn:hover {
        transform: translateY(-2px) scale(1.02);
        filter: brightness(1.08);
      }

      .status {
        margin-top: 16px;
        color: var(--muted);
        font-size: 14px;
      }

      .progress {
        margin-top: 12px;
        width: 100%;
        height: 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent0), var(--accent1), var(--accent2));
        transition: width 0.4s ease-out;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <span class="pill">By DEXPLOSION Corp.</span>
      <h1>Dexcrafk</h1>
      <p class="sub">VoxelCraft sandbox · Windows installer</p>

      <div class="row">
        <button id="downloadBtn" class="btn">
          ⬇ Download Dexcrafk-Setup.exe
        </button>
      </div>

      <div id="status" class="status">Ready to download from GitHub Releases.</div>

      <div class="progress">
        <div id="bar" class="bar"></div>
      </div>

      <p class="status" style="margin-top:18px;">
        Installer path: <code>%LOCALAPPDATA%\Programs\Dexcrafk</code><br>
        Server configs: <code>Documents\Dexcrafk\Servers</code>
      </p>
    </main>

    <script>
      const DOWNLOAD_URL =
        "https://github.com/dandfggv/Dexcraft/releases/download/Latest/Dexcrafk-Setup.exe";

      const btn = document.getElementById("downloadBtn");
      const bar = document.getElementById("bar");
      const status = document.getElementById("status");

      btn.onclick = () => {
        status.textContent = "Connecting to GitHub…";
        bar.style.width = "20%";

        setTimeout(() => {
          status.textContent = "Downloading installer…";
          bar.style.width = "60%";

          const a = document.createElement("a");
          a.href = DOWNLOAD_URL;
          a.download = "Dexcrafk-Setup.exe";
          a.click();
        }, 800);

        setTimeout(() => {
          status.textContent = "Download started. Check your browser’s downloads.";
          bar.style.width = "100%";
        }, 2000);
      };
    </script>
  </body>
</html>
